apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-list-deployment # review
  namespace: todolist-grupo-01
  labels:
    app: todo-list
spec:
  replicas: 2
  selector:
    matchLabels:
      component: todo-list-app
  template:
    metadata:
      labels:
        component: todo-list-app
    spec:
      containers:
        - name: todo-list-app
          image: andreffcastro/k8s-todolist:1.0.0
          envFrom:
            - configMapRef:
                name: todo-list-config
            - secretRef:
                name: todo-list-secret
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: todo-list-app-data
              mountPath: /data
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 64m
              memory: 128Mi
      volumes:
        - name: todo-list-app-data
          persistentVolumeClaim:
            claimName: todo-list-pvc